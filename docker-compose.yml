services:
  qrcode:
    # build: .
    image: raskitoma/qrcode:latest
    container_name: qrcode
    hostname: qrcode
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Guayaquil}
      - PIXEL_WIDTH=${PIXEL_WIDTH:-20}
      - FG_COLOR=${FG_COLOR:-#000000}
      - BG_COLOR=${BG_COLOR:-#ffffff}
      - LOGO_DARK_URL=${LOGO_DARK_URL:-/img/rask_logo-white.svg}
      - LOGO_LIGHT_URL=${LOGO_LIGHT_URL:-/img/rask_logo-black.svg}
    ports:
      - "${HOST_PORT:-8060}:3000"
    restart: always
