<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Raskitoma QR - Premium QR Generator</title>
    <meta name="description" content="Sleek and powerful QR Code generator with logo support.">
    <link rel="icon" href="/favicon.svg?v=1" type="image/svg+xml">
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/css/qr.css">
</head>

<body id="page-top">
    <header>
        <div class="logo-container">
            <img src="/img/rask_logo-white.svg" alt="Raskitoma" class="logo" id="header-logo">
        </div>
        <div class="nav-actions">
            <select id="lang-select" class="lang-select">
                <option value="en">English</option>
                <option value="es">Español (Latam)</option>
            </select>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                <i data-lucide="sun" id="theme-icon-light" class="d-none"></i>
                <i data-lucide="moon" id="theme-icon-dark"></i>
            </button>
        </div>
    </header>

    <main>
        <div class="app-container">
            <section class="hero-text fade-in">
                <div class="form-card">
                    <h1 id="t-title">Generate QR</h1>
                    <p id="t-subtitle">Create custom QR codes with your brand logo in seconds.</p>
                    
                    <form id="qr-form">
                        <div class="input-group">
                            <label for="qrtext" id="t-label-text">QR Content</label>
                            <input type="text" id="qrtext" name="text" placeholder="https://raskitoma.com" autocomplete="off">
                        </div>

                        <div class="input-group">
                            <label id="t-label-logo">Logo (optional)</label>
                            <div class="file-input-wrapper">
                                <label for="logo" class="custom-file-upload" id="t-upload-label">
                                    <i data-lucide="upload-cloud" style="vertical-align: middle; margin-right: 8px;"></i>
                                    <span id="t-upload-text">Choose image...</span>
                                </label>
                                <input type="file" id="logo" name="logo" accept="image/png,image/jpeg,image/webp,image/gif,image/svg+xml">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="logo_scale" id="t-label-size">Logo Size</label>
                            <div class="slider-container">
                                <input type="range" id="logo_scale" name="logo_scale" min="5" max="30" step="1" value="20">
                                <span class="value-badge" id="logo-scale-value">20%</span>
                            </div>
                        </div>
                    </form>
                </div>
            </section>

            <section class="preview-section fade-in" style="animation-delay: 0.1s;">
                <div class="qr-container" id="qr-container">
                    <div id="qr-placeholder" class="qr-placeholder">
                        <div class="placeholder-icon">
                            <i data-lucide="qr-code" style="width: 100%; height: 100%;"></i>
                        </div>
                        <p id="t-placeholder">Waiting for content...</p>
                    </div>
                    <img id="qrcodeimg" class="d-none" alt="Generated QR Code">
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Raskitoma. <span id="t-rights">All Rights Reserved.</span></p>
        <div class="footer-links">
            <a href="https://raskitoma.com" target="_blank">raskitoma.com</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/js/app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
